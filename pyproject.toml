[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".venv",
  "data",
  "exports",
  ".pytest_cache",
  ".pytest-tmp"
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[tool.bandit]
exclude_dirs = [
  "tests",
  ".venv",
  "data",
  "exports",
  ".pytest_cache",
  ".pytest-tmp"
]
skips = ["B101"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "skip"
warn_unused_ignores = true
warn_redundant_casts = true
show_error_codes = true
exclude = "(^data/|^exports/|\\.venv/)"

[tool.coverage.run]
branch = true
source = ["core", "scripts", "tests"]

[tool.coverage.report]
skip_empty = true
show_missing = true
